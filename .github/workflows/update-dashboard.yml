name: Update BO Control Tower Dashboard

on:
  schedule:
    # Chạy mỗi 2 tiếng — có thể điều chỉnh xuống 1h khi dữ liệu sẵn sàng hơn
    - cron: '0 */2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update-dashboard]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # pandas/requests kept for future use; core pipeline uses stdlib only
        run: pip install pandas requests

      - name: Fetch data from Google Sheets (CSV export)
        run: python scripts/data_fetcher.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run Data Quality Gate (DQG)
        run: python scripts/dqg_validator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Calculate KPIs from validated data
        run: python scripts/kpi_calculator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build KPI dashboard HTML
        run: python scripts/dashboard_builder.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html logs/
          git diff --cached --quiet || git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
